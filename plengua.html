<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programación Didáctica · Lengua Castellana y Literatura 6º</title>
<style>
:root{
  --azul:#1e3a8a; --azul-claro:#3b82f6; --azul-bg:#eff6ff;
  --gris-bg:#f4f5f7; --texto:#1f2937; --texto-suave:#4b5563; --borde:#e2e8f0;
  --verde:#16a34a; --ambar:#d97706; --blanco:#ffffff;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--gris-bg);color:var(--texto);}
.app{display:flex;min-height:100vh;}

/* ---------- SIDEBAR ---------- */
.sidebar{width:270px;flex-shrink:0;background:var(--azul);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar-header{display:flex;align-items:center;gap:10px;padding:16px;border-bottom:1px solid rgba(255,255,255,.15);}
.sidebar-header img{height:40px;width:40px;object-fit:contain;background:#fff;border-radius:6px;padding:2px;}
.sidebar-header .titles{font-size:12px;line-height:1.3;}
.sidebar-header .titles b{display:block;font-size:13px;}
.nav-group{padding:10px 8px;}
.nav-group h4{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#93c5fd;margin:14px 10px 6px;}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:none;color:#dbeafe;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13.5px;margin-bottom:2px;}
.nav-btn:hover{background:rgba(255,255,255,.1);}
.nav-btn.active{background:#fff;color:var(--azul);font-weight:600;}
.sa-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.2);font-size:11px;flex-shrink:0;}
.nav-btn.active .sa-num{background:var(--azul);color:#fff;}

/* ---------- MAIN ---------- */
.main{flex:1;min-width:0;}
.topbar{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--borde);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
.topbar h2{margin:0;font-size:17px;color:var(--azul);}
.topbar .sub{font-size:12px;color:var(--texto-suave);margin-top:2px;}
.actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn{border:1px solid var(--borde);background:#fff;color:var(--texto);padding:8px 14px;border-radius:7px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:#f8fafc;}
.btn-primary{background:var(--azul);border-color:var(--azul);color:#fff;}
.btn-primary:hover{background:#1e40af;}
.btn-green{background:var(--verde);border-color:var(--verde);color:#fff;}
.btn-green:hover{background:#15803d;}

.content{padding:22px 26px 60px;max-width:1100px;}
.page{display:none;}
.page.active{display:block;}

.card{background:#fff;border:1px solid var(--borde);border-radius:10px;padding:18px 20px;margin-bottom:16px;}
.card h3{margin:0 0 10px;font-size:14.5px;color:var(--azul);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--borde);padding-bottom:8px;}
.card h4{margin:14px 0 6px;font-size:13px;color:var(--texto-suave);text-transform:uppercase;letter-spacing:.03em;}
.field{outline:none;border:1px solid transparent;border-radius:6px;padding:6px 8px;line-height:1.55;font-size:13.5px;transition:.15s;min-height:20px;}
.field:hover{background:#f8fafc;}
.field:focus{border-color:var(--azul-claro);background:var(--azul-bg);}
.field[data-empty="true"]:empty:before{content:attr(data-placeholder);color:#9ca3af;font-style:italic;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.chipbox{display:flex;flex-wrap:wrap;gap:6px;}
.chip{background:var(--azul-bg);color:var(--azul);border:1px solid #bfdbfe;padding:4px 10px;border-radius:20px;font-size:12px;position:relative;}
.badge{display:inline-block;background:var(--azul);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;margin-right:4px;}
.editable-list{list-style:none;margin:0;padding:0;}
.editable-list li{padding:5px 8px;border-radius:6px;font-size:13.5px;position:relative;}
.editable-list li:hover{background:#f8fafc;}
.editable-list li:before{content:"•";color:var(--azul-claro);margin-right:8px;}
.meta-row{display:flex;gap:22px;flex-wrap:wrap;margin-bottom:6px;}
.meta-item{font-size:13px;}
.meta-item b{display:block;color:var(--texto-suave);font-size:11px;text-transform:uppercase;letter-spacing:.03em;}
.curric-block{border:1px dashed #bfdbfe;border-radius:8px;padding:10px 12px;margin-bottom:8px;background:#fafcff;}
.curric-block .code{font-weight:700;color:var(--azul);font-size:12.5px;}
.curric-block .desc{font-size:12.5px;color:var(--texto-suave);margin-top:4px;line-height:1.5;}
.confine-box{border:1px solid #fde68a;background:#fffbeb;border-radius:8px;padding:14px 16px;}
.confine-box h3{color:var(--ambar);border-bottom-color:#fde68a;}
.hero{display:flex;align-items:center;gap:18px;background:#fff;border:1px solid var(--borde);border-radius:12px;padding:20px 24px;margin-bottom:18px;}
.hero img{height:64px;object-fit:contain;}
.hero .titlebox{flex:1;}
.hero .titlebox h1{margin:0 0 4px;font-size:20px;color:var(--azul);}
.hero .titlebox .field{font-size:13px;}
.toc{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-top:6px;}
.toc a{display:block;background:#fff;border:1px solid var(--borde);border-radius:8px;padding:12px 14px;text-decoration:none;color:var(--texto);font-size:13px;}
.toc a:hover{border-color:var(--azul-claro);background:var(--azul-bg);}
.toc a b{color:var(--azul);display:block;font-size:12px;margin-bottom:2px;}
.small-note{font-size:11.5px;color:#9ca3af;margin-top:10px;}

/* Print */
@media print{
  .sidebar,.topbar,.no-print{display:none !important;}
  .content{max-width:100%;padding:0;}
  body{background:#fff;}
  .card{border:1px solid #ccc;break-inside:avoid;box-shadow:none;}
  .page{display:none !important;}
  .page.print-target{display:block !important;}
  body.print-all .page{display:block !important;}
  .field:focus{background:none;border-color:transparent;}
}
</style>
</head>

<script id="data-json" type="application/json">{"elementosComunes":{"centro":"CEIP Santa Bárbara","nivel":"6º","docentes":"Simón Martín Santos / Agustín Castellano Caraballo","puntoPartidaGeneral":"La programación que este documento recoge tiene como intención, por parte del equipo docente que atiende a este grupo-clase y desde el respaldo del currículo de Educación Primaria, el Proyecto Educativo y la Programación General Anual del Centro, concretar la planificación de la actividad docente con el fin de organizar la actividad didáctica; esta programación se concretará en diferentes situaciones de aprendizaje. Para planificar nuestra programación hemos partido desde la idea de que toda acción educativa que se va a realizar en un centro debe plasmarse en documentos, que deberán ser fruto de la elaboración reflexiva por parte de los miembros de la comunidad educativa. Para su desarrollo se ha tomado como referente el Decreto 211/2022, de 10 de noviembre, por el que se establece la ordenación y el currículo de la Educación Primaria en la Comunidad Autónoma de Canarias. Se han seguido las directrices establecidas por la Comisión de Coordinación Pedagógica en el marco del Proyecto Educativo y en la Programación General Anual, y para su realización se han tenido en cuenta, además, las características del centro, del entorno, de las familias y del alumnado, sobre todo de sus propios intereses y necesidades. Todas estas consideraciones se han tenido en cuenta en la concepción de esta programación didáctica, basándonos en un proyecto curricular que permita adaptar el trabajo pedagógico a las características culturales y ambientales del contexto, atendiendo a la diversidad de intereses, motivaciones y características del alumnado. Es un proyecto de apoyo didáctico enfocado a orientar nuestra práctica educativa, asegurando la coherencia con las intenciones educativas del centro y permitiendo su análisis, evaluación y mejora. Nuestra programación didáctica está formada por diversas situaciones de aprendizaje diseñadas para estimular al alumnado desarrollando todas sus capacidades, potenciando al máximo sus posibilidades de desarrollo. Será un documento fundamentalmente abierto y flexible, sujeto siempre a posibles modificaciones, ampliaciones y mejoras.","puntoPartida6A":"El alumnado de 6º A está formado por un total de 23 alumnos","puntoPartida6B":"El alumnado de 6º B está formado por un total de 22 alumnos, de los cuáles  son niños y  son niñas.","puntoPartida6C":"El alumnado de 6ºC está formado por un total de 24 alumnos, de los cuáles 13 son niños y 11 son niñas. Es un grupo con una amplia variedad tanto en los ritmos de aprendizaje como en el comportamiento. Entre ellos se encuentra un alumno con TDAH, una alumna con DEA y dos alumnos con Altas Capacidades Intelectuales.","justificacion":"El área de Lengua Castellana y Literatura tiene como finalidad fundamental el desarrollo de la competencia comunicativa del alumnado; este enfoque comunicativo ha de estar centrado en el uso de la lengua y en la visión de la persona como un ser social, con necesidad de comunicarse, ordenar pensamientos y estructurar la realidad a través del lenguaje. En este sentido, la lengua permite la integración del alumnado en su entorno, mostrando una actitud crítica y participativa, analizando de manera crítica la información que le rodea y convirtiéndola en conocimiento. La adquisición y mejora de la competencia lectora contribuye a que el alumnado se desenvuelva en la sociedad del conocimiento. A través de las diferentes unidades de programación, vinculadas al plan lector del centro, el alumnado mejorará en las estrategias de comprensión lectora, para disfrutar y aprender leyendo, en formato impreso o digital. Al alumnado se le garantizarán diferentes acciones comunicativas con el objeto de organizar y preparar el discurso para posteriormente comunicarlo, partiendo de textos significativos y cercanos a la realidad, ampliando progresivamente los objetivos de producción textual, ya sean orales o escritos. Estas actividades requerirán que el alumnado aprenda a empatizar con el interlocutor, respetando el turno de palabra, trabajando de manera coordinada, tomando decisiones, teniendo una actitud voluntariosa y de compromiso personal y colectivo.","modelosMetodologicos":"Dadas las características del área, se hace necesario el uso de varios modelos y métodos de enseñanza, fundamentalmente aquellos que favorezcan el pensamiento crítico, a través del análisis de información, creación de opinión propia, mejora de la capacidad de discusión, escucha activa y empatía con las ideas de los demás. El pensamiento creativo y divergente estará presente en aquellas unidades donde el alumnado cree diferentes textos, partiendo de una idea y generando otras para converger en una producción individual o colectiva. Las experiencias prácticas del alumnado a través de coloquios, debates y exposiciones orales permitirán mejorar las relaciones sociales dentro del aula. El aprendizaje se basará en modelos inclusivos, basados en pequeños retos significativos, con trabajo desde equipos cooperativos, identificando la responsabilidad individual y grupal. Se utilizarán modelos como expositivo y jurisprudencial, así como sinéctico, inductivo básico y enseñanza no directiva, fomentando aprendizajes creativos y autónomos, con el profesorado como guía. Se hará uso del aprendizaje cooperativo mediante técnicas como el rompecabezas, folio giratorio, lectura compartida, la diana, lápices al centro, entre otras; y del aprendizaje basado en el pensamiento, a través de rutinas como «pon un titular», «veo-pienso-me pregunto», «frase-resumen», «la brújula» y la destreza «compara y contrasta».","agrupamientosGeneral":"Se priorizará, en todo momento, el trabajo cooperativo del alumnado para potenciar la mejora de los aspectos sociales, así como las destrezas propias de la competencia lingüística (hablar, escuchar, leer y escribir). Las unidades de programación se han diseñado para todo el alumnado, contemplando la diversidad de intereses, necesidades y respetando los diferentes ritmos y estilos de aprendizaje e inteligencias.","espaciosGeneral":"El alumnado permanecerá la mayor parte de las sesiones en su aula, pero también se contempla la asistencia a los diferentes espacios comunicativos y expresivos (aula, salón de actos, canchas, patios, teatros). Además, se llevará a cabo la técnica de búsqueda y tratamiento de la información en los espacios habilitados para ello (aula de informática, biblioteca de aula, de centro, públicas).","recursosGeneral":"Los recursos y materiales seleccionados y elaborados son variados, pudiéndose adaptar a los diferentes niveles y ritmos de aprendizaje. Las nuevas tecnologías, el uso de herramientas digitales (libro virtual), la búsqueda y planificación de la información ampliarán conocimientos y reforzarán los aprendizajes del alumnado. Se introducirán fichas para la coevaluación y autoevaluación del alumnado, así como el diario de aprendizaje que permitirán la reflexión constante del alumnado para seguir mejorando. En cuanto a recursos humanos, se apoyará esta programación en la coordinación con otros profesores y profesoras.","actividadesComplementariasTexto":"El área se debe trabajar de forma interdisciplinar con otras, propiciando el abordaje de destrezas propias del área y la conexión con otras actividades, proyectos y redes del centro educativo. La vinculación de esta área con el plan de lectura, y los proyectos que integren el modelo de convivencia positiva, son fundamentales para unirlos a actividades complementarias que se realicen en esta línea siempre que sea posible, como cuentacuentos, obras de teatro, convivencias entre centros...","actividadesComplementariasLista":[{"trimestre":"Primer trimestre","actividad":"Salida Televisión Canaria"},{"trimestre":"Segundo trimestre","actividad":"Visita Museo"},{"trimestre":"Tercer trimestre","actividad":"Viaje final de curso"}],"atencionDiversidad":"A través de las situaciones de aprendizaje y los modelos metodológicos que favorecerán el aprendizaje cooperativo, el uso responsable de roles, las rutinas y destrezas del pensamiento, así como la utilización de recursos diversos y estrategias de atención al alumnado con NEAE que forme parte del aula (tutoría entre iguales, docencia compartida del profesorado de NEAE), se favorecerá la integración de la diversidad en el aula. Se podrán llevar a cabo diferentes adaptaciones en cuanto a la extensión del material presentado o de los productos solicitados al alumnado, el tiempo dedicado a cada actividad, el nivel de apoyo necesario por parte del profesorado, las instrucciones empleadas (ejemplificaciones, apoyos visuales), la forma de presentación de los resultados y la dificultad de las tareas planteadas.","orientacionesNEAE":"El alumnado de NEAE se sentará cerca del profesorado y lejos, en lo posible, de motivos de distracción. Las tareas de clase o para casa se reducirán o fragmentarán y estarán bajo supervisión continua, combinando actividades más y menos motivadoras, graduadas y contextualizadas. Se potenciarán otras capacidades en las que el alumnado destaque, con la finalidad de mejorar su autoestima y motivación. La instrucción oral irá acompañada de refuerzos y apoyos visuales, verificando su comprensión. El seguimiento implicará el uso de la agenda de deberes, procurando no proporcionar una nueva consigna hasta que no esté realizada la anterior. Se anticiparán rutinas y actividades con apoyo visual. Durante el examen se darán indicaciones de apoyo (control del tiempo, repaso previo a la entrega) y se conocerán las fechas de las pruebas con antelación. En el caso del alumnado con TDAH, atendiendo al artículo 29.8 de la Orden de 13 de diciembre de 2010, se facilitará la posibilidad de realizar las pruebas de forma oral o a través del ordenador (salvo en lectoescritura de Lengua), desarrollando las pruebas escritas en dos sesiones como mínimo y presentando las preguntas con la inclusión de ítems de un mismo tipo. Para el alumnado con DEA se simplificarán las instrucciones escritas, se revisará el vocabulario nuevo, se posibilitará el uso del ordenador, se proporcionará tiempo extra, se reducirán y fraccionarán las actividades, se facilitará el uso de grabadora y libros de texto grabados para el alumnado con dislexia, se ampliarán las pausas orales y se evitará hacerles copiar los enunciados. Respecto al alumnado con dificultad específica de aprendizaje en lectura y escritura, se procederá antes del examen a la lectura de todas las preguntas.","evaluacionGeneral":"La evaluación también favorecerá la atención a la diversidad, ya que los instrumentos serán variados para responder a las características de todo el alumnado y la consecución de los aprendizajes reflejados en los criterios de evaluación. Se favorecerá tanto la autoevaluación como la coevaluación, que constituyen las mejores instancias para que el alumnado se apropie de los criterios de evaluación y regule sus aprendizajes a través de una mirada crítica sobre sus propios desempeños; es decir, la evaluación como aprendizaje involucra activamente al alumnado en su propio proceso de aprendizaje. A través del diario de aprendizaje, exposiciones orales, la teatralización, el diseño grupal de un periódico escolar, cómic, entre otras producciones, la heteroevaluación será constante a lo largo de las situaciones de aprendizaje, para que el profesorado pueda evaluar el proceso, reconducir y adaptar los aprendizajes en todo momento. Las herramientas de evaluación utilizadas serán también variadas (rúbricas de los criterios, listas de control, escalas de valoración, registros de observación). La evaluación formativa permitirá al profesorado y al alumnado evidenciar el progreso y las dificultades, así como reflexionar sobre los aprendizajes.","estrategiasRefuerzo":"Se aplicarán medidas de refuerzo educativo y de recuperación de aprendizajes no alcanzados por el alumnado que presente dificultades, reforzando dichos aprendizajes en las siguientes situaciones de aprendizaje desarrolladas y a través del trabajo de los criterios de evaluación longitudinales en los tres trimestres.","concrecionObjetivos":"Este apartado se ha realizado teniendo en cuenta las orientaciones que ofrece el Decreto por el que se establecen la ordenación y el currículo de la Educación Primaria en la Comunidad Autónoma de Canarias, basado en el Real Decreto 157/2022, de 1 de marzo, por el que se establecen la ordenación y las enseñanzas mínimas de la Educación Primaria. El área de Lengua Castellana y Literatura se relaciona directamente con el objetivo que contribuye a adquirir la capacidad de conocer y utilizar de manera apropiada la lengua castellana y adquirir hábitos de lectura (e), así como ejercitar la competencia comunicativa en otro idioma, fomentando la reflexión interlingüística, propia del objetivo (f). A través de esta área se proporcionan los principios que regulan la comunicación humana y se desarrollan las capacidades interpersonales que favorecen la consecución de los objetivos (a), (c), (d) y (m), a través de la resolución pacífica de conflictos, el respeto a las diferencias y la corresponsabilidad en el trabajo compartido. El carácter instrumental del área permite plantear textos que contribuyan a los objetivos de salud personal y social (n) y (k). Asimismo, el área coadyuva al desarrollo de capacidades intrapersonales que generan sentido crítico, iniciativa personal y confianza, contribuyendo a los objetivos (b), (h) y (l). Favorece también el objetivo (g), relacionado con la comprensión de problemas científicos, matemáticos y tecnológicos, y los objetivos (i) y (j), mediante la multialfabetización y la creación e interpretación de expresiones artísticas."},"curriculo":{"competencias":{"C1":{"enunciado":"Reconocer la diversidad lingüística del mundo a partir de la identificación de las lenguas del alumnado y de la realidad plurilingüe y multicultural de España, para favorecer la reflexión interlingüística, para identificar y rechazar estereotipos y prejuicios lingüísticos y para valorar dicha diversidad como fuente de riqueza cultural.","descriptores":"CCL1, CCL5, CP2, CP3, CC1, CC2, CCEC1, CCEC3","explicacion":"A través de este bloque competencial, se constatará que el alumnado reconoce la diversidad lingüística presente en su entorno más cercano y es capaz de valorar la realidad plurilingüe existente en el mundo, incluyendo los distintos SAAC y la lengua de signos. Para ello, se comprobará que puede realizar, de manera autónoma, una reflexión interlingüística para comparar y relacionar las características propias del español de Canarias con otras variedades y otros dialectos, tanto peninsulares como de la América hispanohablante, efectuando transferencias sencillas entre ellos, entendiendo la vinculación existente entre el acervo histórico-cultural y el desarrollo lingüístico de cada lengua y cada dialecto, construyendo su biografía lingüística personal, realizando una aproximación a la lengua de signos y a los SAAC, y apreciando la diversidad etnocultural y lingüística como riqueza y herramienta de reflexión. Asimismo, se comprobará que el alumnado desarrolla, en contextos cotidianos de comunicación, estrategias de identificación de prejuicios y estereotipos lingüísticos con actitud cooperativa, inclusiva y respetuosa, y detectando los abusos de poder a través de la palabra, lo que le permitirá resolver conflictos de manera dialogada y justa.","criterios":{"1.1":"Identificar las lenguas de España y distintas variedades dialectales del español, reconociendo especialmente características propias del español de Canarias y estableciendo comparaciones y relaciones con otras variedades y otros dialectos, tanto peninsulares como de la América hispanohablante, detectando prejuicios y estereotipos lingüísticos frecuentes y entendiendo la vinculación existente entre el acervo histórico y cultural y el desarrollo lingüístico de cada lengua y cada dialecto, con la finalidad de valorar y respetar la pluralidad lingüística del entorno y del mundo como una fuente de riqueza cultural."}},"C2":{"enunciado":"Comprender e interpretar textos orales y multimodales, identificando el sentido general y la información más relevante y valorando con ayuda aspectos formales y de contenido básicos, para construir conocimiento y responder a diferentes necesidades comunicativas.","descriptores":"CCL2, CP2, STEM1, CD3, CPSAA3, CC3","explicacion":"A través de este bloque competencial, se persigue constatar que el alumnado adquiere las destrezas necesarias para obtener, seleccionar, valorar y relacionar informaciones procedentes tanto del propio contexto escolar como de los medios de comunicación, en el marco del progreso de su vida académica y de su ciudadanía. Para ello se comprobará que comprende de manera individual y cooperativa el sentido de textos orales y multimodales del ámbito personal, social y educativo en contextos formales e informales y de diferentes tipologías, aplicando estrategias de escucha activa, identificando las ideas más relevantes y realizando las inferencias y deducciones necesarias, realizando una valoración crítica sobre el contenido e identificando elementos no verbales y formales para construir conocimiento y responder a diferentes necesidades comunicativas.","criterios":{"2.1":"Comprender el sentido de textos orales y multimodales, reconociendo las ideas principales y los mensajes explícitos e implícitos de manera individual y cooperativa, realizando una valoración crítica sobre el contenido e identificando elementos no verbales y formales para responder a diferentes necesidades comunicativas."}},"C3":{"enunciado":"Producir textos orales y multimodales, con coherencia, claridad y registro adecuados, para expresar ideas, sentimientos y conceptos; construir conocimiento; establecer vínculos personales; y participar con autonomía y una actitud cooperativa y empática en interacciones orales variadas.","descriptores":"CCL1, CCL3, CCL5, CP2, STEM1, CD2, CD3, CPSAA1, CC2, CE1","explicacion":"A través de este bloque competencial, se comprobará que el alumnado es capaz de producir textos orales de manera autónoma, utilizando la palabra como herramienta de construcción del pensamiento, profundizando como hablante funcional y siendo capaz de cubrir necesidades comunicativas desenvolviéndose en diversos contextos de discurso oral, tanto espontáneo como planificado, teniendo en cuenta las características del español de Canarias. Se valorará si planifica y organiza el discurso, utilizando herramientas digitales como apoyo visual o guion, controlando el tiempo y empleando el vocabulario adecuado a la situación comunicativa.","criterios":{"3.1":"Producir textos orales y multimodales, utilizando tanto el vocabulario apropiado al contexto como recursos verbales y no verbales, y respetando los rasgos del español de Canarias, para transmitir información de manera autónoma, coherente y fluida, ajustándose a la intencionalidad comunicativa.","3.2":"Participar en interacciones orales espontáneas o planificadas utilizando métodos y estrategias acordes a cada situación comunicativa, respetando las normas de la cortesía lingüística y desarrollando estrategias de escucha activa y de cooperación conversacional para satisfacer diferentes necesidades comunicativas."}},"C4":{"enunciado":"Comprender e interpretar textos escritos y multimodales, reconociendo el sentido global, las ideas principales y la información explícita e implícita, y realizando con ayuda reflexiones elementales sobre aspectos formales y de contenido, para adquirir y construir conocimiento y para responder a necesidades e intereses comunicativos diversos.","descriptores":"CCL2, CCL3, CCL5, CP2, STEM1, CD1, CPSAA4, CPSAA5","explicacion":"A través de este bloque competencial, se valorará que el alumnado sea capaz de interpretar diferentes textos escritos y multimodales del ámbito personal, social o escolar con diferente tipología, diversidad de géneros discursivos y en diferentes formatos, analizando y valorando su contenido y sus características. Asimismo, se comprobará que responde a distintas estrategias antes, durante y después de la lectura. De este modo se verificará que la interpretación de los textos favorece el acceso al conocimiento del mundo y la adquisición de nuevos aprendizajes, a través de la ampliación de su vocabulario y la fijación de la ortografía.","criterios":{"4.1":"Leer textos escritos y multimodales de manera silenciosa o en voz alta, identificando el sentido global y la información relevante, utilizando estrategias de comprensión antes, durante y después de la lectura y realizando inferencias para superar la interpretación literal en la comprensión lectora.","4.2":"Analizar y valorar el contenido y aspectos no verbales y formales elementales de textos escritos y multimodales, evaluando su calidad, su fiabilidad y su idoneidad en función del propósito de lectura, con el fin de formar personas competentes y autónomas en la lectura."}},"C5":{"enunciado":"Producir textos escritos y multimodales, con corrección gramatical y ortográfica básicas, secuenciando correctamente los contenidos y aplicando estrategias elementales de planificación, textualización, revisión y edición, para construir conocimiento y para dar respuesta a demandas comunicativas concretas.","descriptores":"CCL1, CCL3, CCL5, STEM1, CD2, CD3, CPSAA4, CPSAA5, CC2","explicacion":"A través de este bloque competencial, se comprobará que el alumnado es capaz de producir, de manera creativa, textos escritos y multimodales con coherencia, cohesión y adecuación, aplicando estrategias para las distintas fases del proceso: planificación, redacción, revisión, edición y difusión, con la debida observación a los rasgos del español de Canarias y respetando la propiedad intelectual de los contenidos que reutiliza.","criterios":{"5.1":"Producir textos escritos y multimodales coherentes, de manera creativa y en distintos soportes, conociendo los riesgos de la difusión del contenido en entornos digitales, seleccionando el modelo discursivo que mejor responda a cada situación comunicativa, aplicando las normas gramaticales y ortográficas con la debida observación a los rasgos del español de Canarias, y utilizando estrategias de planificación, redacción, revisión y edición, con el objetivo de transmitir información y comunicar conocimientos, pensamientos, experiencias y emociones."}},"C6":{"enunciado":"Buscar, seleccionar y contrastar información procedente de dos o más fuentes, de forma planificada y con el debido acompañamiento, evaluando su fiabilidad y reconociendo algunos riesgos de manipulación y desinformación, para transformarla en conocimiento y para comunicarla de manera creativa, adoptando un punto de vista personal y respetuoso con la propiedad intelectual.","descriptores":"CCL3, CD1, CD2, CD3, CD4, CPSAA5, CC2, CE3","explicacion":"A través de este bloque competencial, se comprobará que el alumnado es capaz de realizar un tratamiento adecuado de la información en un proceso de investigación sencillo, a través de un método de trabajo realizado preferentemente de manera cooperativa en torno a temas relacionados con el propio currículo escolar o con los retos y desafíos del siglo XXI, localizando, seleccionando, contrastando y evaluando la información con actitud ética, responsable y respetuosa con la propiedad intelectual.","criterios":{"6.1":"Compartir, utilizando diferentes lenguajes, los resultados de un proceso pautado de búsqueda de información sobre diferentes temas de interés personal o ecosocial, realizado de manera individual y cooperativa, que implique la localización, la selección y el contraste de información procedente de distintas fuentes, incluidas las digitales, evaluando su fiabilidad y pertinencia, recreando la información de manera creativa, reconociendo y evitando los riesgos de la manipulación y la desinformación, y adoptando un punto de vista crítico, así como respetuoso con la propiedad intelectual para construir su propio conocimiento."}},"C7":{"enunciado":"Leer de manera autónoma obras diversas seleccionadas atendiendo a sus gustos e intereses, compartiendo las experiencias de lectura, para iniciar la construcción de la identidad lectora, para fomentar el gusto por la lectura como fuente de placer y para disfrutar de su dimensión social.","descriptores":"CCL1, CCL4, CD3, CPSAA1, CC3, CCEC1, CCEC2, CCEC3","explicacion":"A través de este bloque competencial, se constatará que el alumnado lee obras de manera autónoma y comparte las experiencias de lectura, usando estrategias para seleccionar, con criterio propio, textos ajustados a sus gustos e intereses y compartiendo su experiencia y sus preferencias en comunidades lectoras, a través de la expresión de hechos y el intercambio de conceptos, pensamientos, opiniones y sentimientos, de forma oral, escrita, artística o multimodal.","criterios":{"7.1":"Leer textos de diversa índole, usando estrategias que favorezcan una selección ajustada a sus gustos, intereses y necesidades con criterio propio, para progresar en la construcción y enriquecimiento de su identidad lectora.","7.2":"Compartir la experiencia de lectura, a través de diferentes técnicas y soportes, aprovechando los recursos que tiene a su alcance y participando en comunidades lectoras en el ámbito escolar o social para disfrutar de la dimensión social de la lectura."}},"C8":{"enunciado":"Leer, interpretar y analizar, de manera acompañada, obras o fragmentos literarios adecuados a su desarrollo, estableciendo relaciones entre ellos e identificando el género literario y sus convenciones fundamentales, para iniciarse en el reconocimiento de la literatura como manifestación artística y fuente de placer, conocimiento e inspiración para crear textos de intención literaria.","descriptores":"CCL1, CCL2, CCL4, CCEC1, CCEC2, CCEC3, CCEC4","explicacion":"Con este bloque competencial, se comprobará que el alumnado, a través de su participación en itinerarios lectores, es capaz de escuchar textos literarios y realizar lecturas guiadas, acompañadas y autónomas, con especial atención a la literatura canaria, y que realiza un análisis de los elementos constitutivos de la obra literaria, así como que produce textos literarios de manera libre a partir de la reelaboración de modelos dados.","criterios":{"8.1":"Escuchar y leer textos literarios, que abarquen diversidad de autores y autoras, con la debida atención a muestras de la literatura canaria, relacionándolos, de manera autónoma, en función de los temas y de aspectos elementales de cada género literario para interpretarlos, valorarlos y relacionarlos con otras manifestaciones artísticas o culturales en la búsqueda del reconocimiento de la lectura literaria como fuente de placer.","8.2":"Producir, de manera autónoma, textos individuales o colectivos, con intención literaria, reelaborando con creatividad los modelos dados en distintos soportes y complementándolos con otros lenguajes artísticos, con la finalidad de mejorar la capacidad expresiva a través de recursos literarios."}},"C9":{"enunciado":"Reflexionar de forma guiada sobre el lenguaje a partir de procesos de producción y comprensión de textos en contextos significativos, utilizando la terminología elemental adecuada, para iniciarse en el desarrollo de la conciencia lingüística y para mejorar las destrezas de producción y comprensión oral y escrita.","descriptores":"CCL1, CCL2, CP2, STEM1, STEM2, CPSAA4, CPSAA5","explicacion":"A través de este bloque competencial, se favorecerá la reflexión continuada en torno a la lengua y sus condiciones de uso, de manera ajustada a las posibilidades de abstracción de estas edades, haciendo especial hincapié en el español hablado en Canarias, y se verificará que el alumnado participa en procesos de auto y coevaluación revisando y mejorando los textos propios y ajenos.","criterios":{"9.1":"Establecer generalizaciones sobre aspectos del funcionamiento de la lengua, con la debida atención al español de Canarias, generando hipótesis y buscando contraejemplos, a partir de la observación, comparación y manipulación de palabras, enunciados y textos, para producir o comprender textos en contextos significativos de manera individual o colectiva.","9.2":"Revisar y mejorar los textos propios y ajenos, identificando fortalezas y debilidades, y subsanando algunos problemas de comprensión lectora y oral, profundizando en la reflexión metalingüística, usando la terminología adecuada y apoyándose en los recursos a su alcance para mejorar el uso de la lengua y comunicarse de manera eficaz y competencial."}},"C10":{"enunciado":"Poner las propias prácticas comunicativas al servicio de la convivencia democrática utilizando un lenguaje no discriminatorio y detectando y rechazando los abusos de poder a través de la palabra, para favorecer un uso no solo eficaz sino también ético del lenguaje.","descriptores":"CCL1, CCL5, CP3, CD3, CPSAA3, CC1, CC2, CC3","explicacion":"A través de este bloque competencial, se comprobará que el alumnado es capaz de planificar y utilizar estrategias, de manera autónoma, para la resolución de conflictos, a través de la deliberación argumentada y el uso del lenguaje, teniendo en cuenta aspectos verbales y no verbales, escuchando activamente, comunicándose de forma asertiva y participando en interacciones comunicativas con una actitud abierta y respetuosa, rechazando prejuicios y estereotipos lingüísticos.","criterios":{"10.1":"Planificar y utilizar estrategias, de manera autónoma, para la deliberación argumentada y la gestión dialogada de conflictos, rechazando los usos lingüísticos discriminatorios y los abusos de poder a través de la palabra, reflexionando de manera cooperativa sobre distintos aspectos verbales y no verbales que rigen la comunicación, teniendo en cuenta la perspectiva de género y las diferencias culturales para contribuir a una sociedad respetuosa."}}},"saberes":{"I":{"titulo":"Las lenguas y sus hablantes","items":{"1":"Reconocimiento de la biografía lingüística personal y mapa lingüístico del entorno.","2":"Identificación, de manera autónoma, de la diversidad etnocultural y lingüística como riqueza y herramienta de reflexión interlingüística, con especial atención a las características propias del español hablado en Canarias y en América.","3":"Aproximación a la lengua de signos a través del reconocimiento del alfabeto dactilológico, expresiones y vocabulario de uso cotidiano, así como a algunos SAAC.","4":"Identificación de prejuicios y estereotipos lingüísticos.","5":"Uso de un lenguaje no discriminatorio y respetuoso con las diferencias."}},"II":{"titulo":"Comunicación","items":{"1.1":"Identificación autónoma de los componentes del hecho comunicativo (situación, participantes, propósito comunicativo, canal, registro) y su adecuación a los diferentes contextos.","2.1":"Empleo de géneros discursivos propios del ámbito personal, social y educativo, atendiendo al contenido y la forma. Uso de redes sociales educativas.","2.2":"Identificación y uso, de manera autónoma, de la estructura de diferentes tipologías textuales en situaciones comunicativas.","2.3":"Aplicación, de manera autónoma, de estrategias sencillas para la coherencia, la cohesión y la adecuación en diferentes tipos de textos.","3.1":"Interacción oral adecuada en contextos espontáneos y reglados, a través de la escucha activa, la asertividad y la cortesía lingüística en la resolución dialogada de conflictos. Expresión y escucha empática de necesidades, vivencias y emociones propias y ajenas.","3.2":"Interacción escrita adecuada en contextos reglados. Expresión y lectura empática de información y opiniones propias y ajenas.","3.3":"Comprensión de textos orales mediante la identificación de las ideas más relevantes, la interpretación del sentido global, la realización de las inferencias necesarias y el reconocimiento de elementos no verbales y formales para llevar a cabo una valoración crítica. Detección de usos discriminatorios del lenguaje verbal y no verbal.","3.4":"Producción de textos orales y multimodales, atendiendo a los elementos de la prosodia y de la comunicación no verbal, y utilizando las características de pronunciación, gramaticales y léxicas del español de Canarias, si esta es la variante dialectal normalmente usada. Construcción y comunicación de conocimiento mediante la planificación y producción de diferentes tipos de textos.","3.5":"Comprensión lectora a través de la aplicación de estrategias antes, durante y después de la lectura. Identificación de las ideas más relevantes e interpretación del sentido global, realizando las inferencias necesarias y llevando a cabo una valoración crítica de manera autónoma. Identificación de elementos gráficos y paratextuales al servicio de la comprensión. Perfeccionamiento de las habilidades lectoras (ritmo, entonación, pausas, timbres de voz…) mediante la lectura compartida. Detección de usos discriminatorios del lenguaje verbal y no verbal.","3.6":"Producción autónoma de textos escritos y multimodales en distintos soportes, incluyendo los digitales, y aplicando la ortografía reglada en la textualización y la autocorrección, con la debida atención a las características gramaticales y léxicas del español de Canarias. Elaboración, de manera autónoma, de textos creativos con coherencia, cohesión y adecuación, utilizando estrategias, individuales o grupales, de planificación, textualización, revisión y autocorrección, y realizando una valoración crítica de los mismos. Uso de elementos gráficos y paratextuales para favorecer la comprensión.","3.7":"Afianzamiento de la alfabetización mediática e informacional, aplicando estrategias para la búsqueda libre pautada de información en fuentes documentales variadas y con distintos soportes y formatos. Reconocimiento de la autoría y respeto por la propiedad intelectual. Comparación, organización, valoración crítica y comunicación creativa de la información. Uso progresivamente autónomo de la biblioteca, así como de recursos digitales del aula."}},"III":{"titulo":"Educación literaria","items":{"1":"Lectura de obras o fragmentos variados y diversos de la literatura, adaptados a su nivel madurativo y organizados en itinerarios lectores, con la debida atención a muestras de la literatura canaria.","2":"Uso de estrategia para la interpretación autónoma y compartida de las obras a través de conversaciones literarias.","3":"Relación, de manera autónoma, entre los elementos constitutivos de la obra literaria (tema, protagonistas, personajes secundarios, argumento, espacio) y la construcción del sentido de la obra.","4":"Identificación y análisis guiado de los recursos literarios y su contribución al texto.","5":"Relación entre los textos leídos y otras manifestaciones artísticas y culturales.","6":"Afianzamiento en la construcción de la identidad lectora. Uso de estrategias para la expresión de gustos e intereses y para la valoración crítica de las obras.","7":"Lectura expresiva, dramatización o interpretación de fragmentos atendiendo a los procesos de comprensión y al nivel de desarrollo.","8":"Creación de textos de intención literaria de manera creativa y autónoma, partiendo de modelos dados y recreando textos literarios.","9":"Uso autónomo de la biblioteca de aula o de centro como escenario de actividades literarias compartidas."}},"IV":{"titulo":"Reflexión sobre la lengua y sus usos en el marco de propuestas de producción y comprensión de textos orales, escritos o multimodales","items":{"1":"Establecimiento de generalizaciones sobre aspectos lingüísticos elementales a partir de la observación, comparación y transformación de palabras y enunciados, prestando especial atención a las relaciones que se establecen entre los distintos tipos de palabras, con la debida consideración al español de Canarias.","2":"Profundización en la lengua como sistema con distintos niveles: palabras, enunciados (oraciones y frases) y textos, a partir de la observación y comparación de estas unidades comunicativas.","3":"Adquisición de vocabulario a través de mecanismos léxicos (derivación, composición, préstamos, extranjerismos, siglas y acrónimos) para la formación de palabras. Aplicación autónoma de los signos de puntuación, teniendo en cuenta la modalidad oracional, tanto para organizar el texto escrito como para expresar la intención comunicativa.","4":"Aplicación de mecanismos de coherencia y cohesión textual, con especial atención a las sustituciones pronominales, a la correlación temporal establecida mediante los distintos tiempos verbales y a los conectores textuales.","5":"Utilización del diccionario en distintos formatos como herramienta para afianzar el conocimiento de la lengua, enriquecer su vocabulario y fijar la ortografía.","6":"Uso autónomo de estrategias de observación y formulación de generalizaciones sobre la acentuación y otras normas ortográficas.","7":"Reflexión interlingüística: realización de transferencias sencillas entre distintas lenguas para contribuir a ampliar el repertorio lingüístico del alumnado."}}}},"sas":[{"id":"sa1","numero":1,"titulo":"LA UNIÓN HACE LA FUERZA","descripcion":"Cuando dos o más personas unen sus ideas y sus sentimientos, es mucho más fácil hacer frente a situaciones problemáticas pues de esta manera nos sentimos respaldadas y protegidas. De esa unión también pueden surgir dificultades que se solventarán a través del diálogo y la toma de acuerdos. Al finalizar la unidad, el alumnado va a preparar una campaña para animar a participar en una actividad solidaria. A su vez, a lo largo de esta primera unidad también se hará hincapié en el mundo literario para descubrir personajes y lugares ilustres de este ámbito.","explicacionBloques":["A través de este bloque competencial, se valorará que el alumnado sea capaz de interpretar diferentes textos escritos y multimodales del ámbito personal, social o escolar con diferente tipología, diversidad de géneros discursivos y en diferentes formatos (hipertextos, gráficos, tablas estadísticas, mapas conceptuales…), analizando y valorando su contenido y sus características. Asimismo, se comprobará que responde a distintas estrategias antes de la lectura (activación de conocimientos previos, inferencias a partir del título, realización de hipótesis, análisis de ilustraciones…), durante la lectura (leer en voz alta, releer, identificar palabras confusas, palabras clave o de otras lenguas, uso del diccionario…) y después de ella (localización y obtención de información explícita, integración de la información a sus conocimientos para transformarla en aprendizaje, realización de inferencias directas e indirectas para ir más allá de la interpretación literal, comprensión de significados de manera global o particular, interpretación de elementos del lenguaje verbal y no verbal, evaluación del contenido, del lenguaje y de los elementos textuales…). De este modo se verificará que la interpretación de los textos favorece el acceso al conocimiento del mundo y la adquisición de nuevos aprendizajes, a través de la ampliación de su vocabulario y la fijación de la ortografía, todo ello como incentivo motivacional que fomenta el placer por la lectura.","Se comprobará que el alumnado es capaz de planificar y utilizar estrategias, de manera autónoma, para la resolución de conflictos, a través de la deliberación argumentada y el uso del lenguaje, teniendo en cuenta aspectos verbales y no verbales, y favoreciendo la utilización no solo eficaz sino también ética de los diferentes sistemas de comunicación (verbal, no verbal, signado…). Asimismo, se constatará que el alumnado es capaz de escuchar activamente, identificando tanto sus propias emociones, ideas y comportamientos como las de las demás personas, reflejando lo que la otra persona dice, parafraseando, aclarando, sintetizando, preguntando o reformulando; de comunicarse de forma asertiva expresando hechos, conceptos, pensamientos, opiniones o sentimientos; y de participar tanto en interacciones comunicativas mostrando una actitud abierta y respetuosa, rechazando prejuicios y estereotipos lingüísticos, y reconociendo el valor del diálogo para mejorar la convivencia, como en actividades cooperativas en las que emplea un lenguaje no discriminatorio y respetuoso con las diferencias, hace uso de herramientas o plataformas virtuales de manera segura y responsable, comprende el valor de respetar las diferentes culturas y creencias, y dialoga sobre problemas éticos, sociales, económicos y ecológicos de la actualidad, defendiendo los principios y valores que rigen los derechos humanos, con el fin último de formar personas preparadas para la gestión dialogada de los conflictos y para construir una sociedad respetuosa e inclusiva."],"competencias":["C4","C10"],"saberesBasicos":["I-3,4,5","II-3.2,3.4,3.5"],"descriptoresClave":"C4: CCL2, CCL3, CCL5, CP2, STEM1, CD1, CPSAA4, CPSAA5 · C10: CCL1, CCL5, CP3, CD3, CPSAA3, CC1, CC2, CC3","criterios":["4.1","4.2","10.1"],"actividades":["Lectura y comprensión de un cuento: Las fechorías del Comesol.","Reconocimiento de diferencias entre derivación y composición.","Reconocimiento de principios de acentuación.","Reconocimiento del sintagma nominal.","Campaña solidaria.","Ruta literaria por las islas."],"programas":["Plan de Comunicación Lingüística","Programa STEAM","Plan de Convivencia","Plan de Igualdad","Radio Escolar","Promoción de la Salud y la Educación Emocional","Huerto Escolar"],"periodo":"Del 21 de septiembre al 02 de octubre","sesiones":"8","trimestre":"1º","tecnicas":["Observación sistemática","Encuestación","Análisis de documentos","Análisis de producciones","Análisis de artefactos"],"herramientas":["Registro anecdótico","Registro descriptivo","Escalas de valoración","Listas de control","Diario de clase del profesorado","Entrevistas"],"instrumentos":["Cuestionarios","Formularios","Rúbricas","Listas de cotejo"],"productos":["Actividades","Rutinas de pensamiento","Fichas de trabajo"],"modelosEnsenanza":"Aprendizaje cooperativo, Aprendizaje basado en proyectos, Aprendizaje basado en el pensamiento: Rutinas y destrezas de pensamiento, Aprendizaje basado en tareas, Inteligencias Múltiples.","metodologias":"Investigación guiada (INV), Inductivo Básico (IBAS), Formación de conceptos (FORC), Sinéctico (SINE), Expositivo (EXPO), Deductivo (DEDU), Organizadores previos (ORGP), Investigación grupal (IGRU), Juego de roles (JROL), Enseñanza directa (EDIR), Simulación (SIM), Enseñanza no directiva (END).","agrupamientos":"Trabajo individual (TIND), trabajo en parejas (TPAR), pequeños grupos (PGRU), gran grupo (GGRU), equipos móviles o flexibles (EMOV), grupos de expertos (GEXP), grupos fijos (GFIJ), grupos heterogéneos (GHET), grupos homogéneos (GHOM), grupos interactivos (GINT).","espacios":["Aula","Aula con recursos TIC"],"recursos":["Recursos web","Multimedia","Ordenadores","PDI","Sistema de proyección","Textuales","Gráficos","Juegos didácticos","Centros de investigación"],"transversales":"Buen uso de las TIC aplicando estrategias básicas basadas en la búsqueda y tratamiento de la información. Convivencia y Educación cívica vinculando las producciones propias individuales y colectivas a una actitud de respeto, valoración contribuyendo al pleno desarrollo personal, creativo y emocional del individuo. Expresión oral y escrita: el alumnado trabajará, de manera oral y escrita, la realización de producciones orales, interacciones orales y presentación multimedia.","vinculacion":"El carácter competencial de esta situación de aprendizaje hace que los aprendizajes se puedan vincular con los propuestos desde el resto de áreas que se imparten en el nivel.","tiposEvaluacion":[{"tipo":"Heteroevaluación","texto":"realizada por personas distintas al alumnado para evaluar y calificar."},{"tipo":"Coevaluación","texto":"realizada entre el alumnado."},{"tipo":"Autoevaluación","texto":"realizada mediante la reflexión individual del alumnado para valorar sus logros y dificultades."}],"valoracionDesarrollo":"","propuestasMejora":"","confinamiento":"En caso de confinamiento utilizaremos la plataforma de formación (EVAGD), como venimos haciendo durante todo el curso. Las sesiones en MEET serán según el  horario presencial, de manera que no desorientemos al alumnado. En caso de poder anticiparlo con antelación, se usarán también recursos en formato papel: libros y cuadernos."},{"id":"sa2","numero":2,"titulo":"¿PROTEGEMOS LOS BOSQUES?","descripcion":"Los bosques son un tipo de ecosistema en el que coexisten multitud de animales y espacios verdes. Sostienen la vida y ayudan a controlar el clima y las precipitaciones. Al inicio de la unidad, se plantea un diálogo grupal sobre este tema para que, en común, los estudiantes reflexionen sobre la importancia de tomar medidas para protegerlos y narrar experiencias propias que han vivido en ellos. Para trabajar los textos descriptivos, el alumnado va a leer e interpretar un texto sobre la longevidad de los árboles. A su vez, los estudiantes comprobarán la fiabilidad de la información recogida en noticias medioambientales y, al finalizar, buscarán información sobre plantas y árboles para elaborar un atlas de botánica. De este modo, la lengua se utiliza como recurso para educar en el medioambiente.","explicacionBloques":["A través de este bloque competencial, se constatará que el alumnado reconoce la diversidad lingüística presente en su entorno más cercano y es capaz de valorar la realidad plurilingüe existente en el mundo, incluyendo los distintos SAAC y la lengua de signos. Para ello, se comprobará que puede realizar, de manera autónoma, una reflexión interlingüística para comparar y relacionar las características propias del español de Canarias con otras variedades y otros dialectos, tanto peninsulares como de la América hispanohablante, efectuando transferencias sencillas entre ellos, entendiendo la vinculación existente entre el acervo histórico-cultural y el desarrollo lingüístico de cada lengua y cada dialecto, construyendo su biografía lingüística personal, realizando una aproximación a la lengua de signos y a los SAAC, y apreciando la diversidad etnocultural y lingüística como riqueza y herramienta de reflexión.","A través de este bloque competencial, se constatará que el alumnado lee obras de manera autónoma y comparte las experiencias de lectura. Para ello se comprobará que puede usar estrategias para seleccionar, con criterio propio, textos ajustados a sus gustos e intereses, partiendo de sus experiencias emocionales y realizando indagaciones que le ayuden a leer con autonomía creciente, obras o fragmentos variados y equilibrados, adecuados a su nivel madurativo y organizados en itinerarios lectores temáticos, de género o de cualquier otra naturaleza."],"competencias":["C1","C7"],"saberesBasicos":["I-1,2,3,4,5","III-1,2,3,5,6,7,9","IV-2,3,6,7"],"descriptoresClave":"C1: CCL1, CCL5, CP2, CP3, CC1, CC2, CCEC1, CCEC3 · C7: CCL1, CCL4, CD3, CPSAA1, CC3, CCEC1, CCEC2, CCEC3","criterios":["1.1","7.1","7.2"],"actividades":["Lectura: la descripción.","Reconocimiento de diferencias entre diptongo e hiatos.","Reconocimiento de los demostrativos y posesivos.","Elaboración de un atlas de botánica canaria."],"programas":["Plan de Comunicación Lingüística","Plan Tic","Plan de Convivencia","Plan de Igualdad","Radio Escolar","Promoción de la Salud y la Educación Emocional","Huerto Escolar"],"periodo":"Del 5 de octubre al 16 de octubre","sesiones":"12","trimestre":"1º","tecnicas":["Observación sistemática","Encuestación","Análisis de documentos","Análisis de producciones","Análisis de artefactos"],"herramientas":["Registro anecdótico","Registro descriptivo","Escalas de valoración","Listas de control","Diario de clase del profesorado","Entrevistas"],"instrumentos":["Cuestionarios","Formularios","Rúbricas","Listas de cotejo"],"productos":["Actividades","Rutinas de pensamiento","Fichas de trabajo"],"modelosEnsenanza":"Aprendizaje cooperativo, Aprendizaje basado en proyectos, Aprendizaje basado en el pensamiento: Rutinas y destrezas de pensamiento, Aprendizaje basado en tareas, Inteligencias Múltiples.","metodologias":"Investigación guiada (INV), Inductivo Básico (IBAS), Formación de conceptos (FORC), Sinéctico (SINE), Expositivo (EXPO), Deductivo (DEDU), Organizadores previos (ORGP), Investigación grupal (IGRU), Juego de roles (JROL), Enseñanza directa (EDIR), Simulación (SIM), Enseñanza no directiva (END).","agrupamientos":"Trabajo individual (TIND), trabajo en parejas (TPAR), pequeños grupos (PGRU), gran grupo (GGRU), equipos móviles o flexibles (EMOV), grupos de expertos (GEXP), grupos fijos (GFIJ), grupos heterogéneos (GHET), grupos homogéneos (GHOM), grupos interactivos (GINT).","espacios":["Aula","Aula con recursos TIC"],"recursos":["Recursos web","Multimedia","Ordenadores","PDI","Sistema de proyección","Textuales","Gráficos","Juegos didácticos","Centros de investigación"],"transversales":"Buen uso de las TIC aplicando estrategias básicas basadas en la búsqueda y tratamiento de la información. Convivencia y Educación cívica vinculando las producciones propias individuales y colectivas a una actitud de respeto, valoración contribuyendo al pleno desarrollo personal, creativo y emocional del individuo. Expresión oral y escrita: el alumnado trabajará, de manera oral y escrita, la realización de producciones orales, interacciones orales y presentación multimedia.","vinculacion":"El carácter competencial de esta situación de aprendizaje hace que los aprendizajes se puedan vincular con los propuestos desde el resto de áreas que se imparten en el nivel.","tiposEvaluacion":[{"tipo":"Heteroevaluación","texto":"realizada por personas distintas al alumnado para evaluar y calificar."},{"tipo":"Coevaluación","texto":"realizada entre el alumnado."},{"tipo":"Autoevaluación","texto":"realizada mediante la reflexión individual del alumnado para valorar sus logros y dificultades."}],"valoracionDesarrollo":"","propuestasMejora":"","confinamiento":"En caso de confinamiento utilizaremos la plataforma de formación (EVAGD), como venimos haciendo durante todo el curso. Las sesiones en MEET serán según el  horario presencial, de manera que no desorientemos al alumnado. En caso de poder anticiparlo con antelación, se usarán también recursos en formato papel: libros y cuadernos."},{"id":"sa3","numero":3,"titulo":"¿TE ACUERDAS?","descripcion":"Los recuerdos son hechos o situaciones que han ocurrido en el pasado y que, con el paso del tiempo, vuelven a nuestra memoria. Algunas maneras de transmitir esos recuerdos son a través de fotografías, historias narradas, expresiones orales, etc. A lo largo de esta unidad, vamos a poner en práctica estas formas de representación para evocar recuerdos. Para finalizar, los estudiantes elaborarán un álbum completo con fotografías y textos. De forma paralela, el alumnado va a desarrollar su identidad lectora expresando su opinión sobre un libro a través de una videorreseña y, además, intentará generar en los demás el interés por la lectura.","explicacionBloques":["A través de este bloque competencial, se comprobará que el alumnado es capaz de producir textos orales de manera autónoma, utilizando la palabra como herramienta de construcción del pensamiento, profundizando como hablante funcional y siendo capaz de cubrir necesidades comunicativas desenvolviéndose en diversos contextos de discurso oral, tanto espontáneo (planteamiento de preguntas, expresión de emociones u opiniones, aclaración de dudas…) como planificado (entrevistas, exposiciones individuales y grupales, narraciones, noticias…) teniendo en cuenta las características del español de Canarias. Para ello se valorará si el alumno o la alumna planifica y organiza el discurso, utilizando herramientas digitales como apoyo visual o guion, controlando el tiempo y empleando el vocabulario adecuado a la situación comunicativa. Asimismo, se verificará que utiliza estrategias de interpretación durante las interacciones, superando el sentido literal y haciendo uso de elementos de la comunicación no verbal. Se pretende constatar que el alumnado aplica estrategias para hablar en público (dicción, entonación, volumen, pausas, vista al público, ritmo, turno de palabra…), validando las características del español de Canarias como modalidad lingüística propia del entorno. Finalmente, atendiendo a la diversidad de perfiles lingüísticos, el alumnado debe tener en cuenta el contexto que lo rodea y adecuarse al interlocutor, el mensaje y su finalidad, utilizando un lenguaje respetuoso, que fomente la asertividad y la cohesión social, y que permita la resolución de conflictos de manera dialogada."],"competencias":["C3"],"saberesBasicos":["II-1.1,2.1,2.2,2.3,3.1,3.2,3.4","IV-1,2,4,5,6"],"descriptoresClave":"C3: CCL1, CCL3, CCL5, CP2, STEM1, CD2, CD3, CPSAA1, CC2, CE1","criterios":["3.1","3.2"],"actividades":["Lectura y comprensión de texto narrativo: No me gusta hacer de pato.","Correcta formación de palabras con sufijos.","Reconocimiento de las normas de acentuación de monosílabos.","Reconocimiento de numerales e indefinidos.","Elaboración de un álbum de recuerdos.","Grabación de una videorreseña."],"programas":["Plan de Comunicación Lingüística","Plan Tic","Plan de Convivencia","Plan de Igualdad","Radio Escolar","Promoción de la Salud y la Educación Emocional","Huerto Escolar"],"periodo":"Del 19 de octubre al 30 de octubre","sesiones":"8","trimestre":"1º","tecnicas":["Observación sistemática","Encuestación","Análisis de documentos","Análisis de producciones","Análisis de artefactos"],"herramientas":["Registro anecdótico","Registro descriptivo","Escalas de valoración","Listas de control","Diario de clase del profesorado","Entrevistas"],"instrumentos":["Cuestionarios","Formularios","Rúbricas","Listas de cotejo"],"productos":["Actividades","Rutinas de pensamiento","Fichas de trabajo"],"modelosEnsenanza":"Aprendizaje cooperativo, Aprendizaje basado en proyectos, Aprendizaje basado en el pensamiento: Rutinas y destrezas de pensamiento, Aprendizaje basado en tareas, Inteligencias Múltiples.","metodologias":"Investigación guiada (INV), Inductivo Básico (IBAS), Formación de conceptos (FORC), Sinéctico (SINE), Expositivo (EXPO), Deductivo (DEDU), Organizadores previos (ORGP), Investigación grupal (IGRU), Juego de roles (JROL), Enseñanza directa (EDIR), Simulación (SIM), Enseñanza no directiva (END).","agrupamientos":"Trabajo individual (TIND), trabajo en parejas (TPAR), pequeños grupos (PGRU), gran grupo (GGRU), equipos móviles o flexibles (EMOV), grupos de expertos (GEXP), grupos fijos (GFIJ), grupos heterogéneos (GHET), grupos homogéneos (GHOM), grupos interactivos (GINT).","espacios":["Aula","Aula con recursos TIC"],"recursos":["Recursos web","Multimedia","Ordenadores","PDI","Sistema de proyección","Textuales","Gráficos","Juegos didácticos","Centros de investigación"],"transversales":"Buen uso de las TIC aplicando estrategias básicas basadas en la búsqueda y tratamiento de la información. Convivencia y Educación cívica vinculando las producciones propias individuales y colectivas a una actitud de respeto, valoración contribuyendo al pleno desarrollo personal, creativo y emocional del individuo. Expresión oral y escrita: el alumnado trabajará, de manera oral y escrita, la realización de producciones orales, interacciones orales y presentación multimedia.","vinculacion":"El carácter competencial de esta situación de aprendizaje hace que los aprendizajes se puedan vincular con los propuestos desde el resto de áreas que se imparten en el nivel.","tiposEvaluacion":[{"tipo":"Heteroevaluación","texto":"realizada por personas distintas al alumnado para evaluar y calificar."},{"tipo":"Coevaluación","texto":"realizada entre el alumnado."},{"tipo":"Autoevaluación","texto":"realizada mediante la reflexión individual del alumnado para valorar sus logros y dificultades."}],"valoracionDesarrollo":"","propuestasMejora":"","confinamiento":"En caso de confinamiento utilizaremos la plataforma de formación (EVAGD), como venimos haciendo durante todo el curso. Las sesiones en MEET serán según el  horario presencial, de manera que no desorientemos al alumnado. En caso de poder anticiparlo con antelación, se usarán también recursos en formato papel: libros y cuadernos."},{"id":"sa4","numero":4,"titulo":"¿QUÉ DICEN LOS ANIMALES?","descripcion":"Los animales también se comunican entre ellos mediante señales visuales, olfativas, auditivas o químicas para conseguir determinados objetivos. Además, algunos de ellos también emiten mensajes a las personas para poder establecer un vínculo o expresar estados de ánimo. La comunicación animal va a ser tema central de esta unidad y, por tanto, en el que se van a basar aprendizajes de la lengua como la exposición de un texto expositivo, la acentuación de frases interrogativas y exclamativas, los pronombres personales, las páginas web, etc. Como actividad de cierre, se le propone a nuestro alumnado la redacción de una noticia protagonizada por un animal.","explicacionBloques":["A través de este bloque competencial, se comprobará que el alumnado es capaz de producir, de manera creativa, textos escritos y multimodales con coherencia, cohesión y adecuación, aplicando estrategias para las distintas fases del proceso: de planificación, a partir de pautas o de la lectura de modelos específicos para cada tipología textual; de redacción, secuenciando correctamente los contenidos y empleando normas gramaticales y ortográficas con la debida observación a los rasgos del español de Canarias; de revisión haciendo un uso progresivamente autónomo de diccionarios y otras fuentes de consulta, participando en procesos de auto y coevaluación, y reconociendo sus limitaciones y sabiendo buscar ayuda; de edición, empleando elementos gráficos y paratextuales sencillos que faciliten la presentación, la organización y la comprensión del texto, y respetando la propiedad intelectual y los derechos de autor de los contenidos que reutiliza; y de difusión, participando así en actividades o proyectos, escolares o comunitarios, mediante el uso de herramientas o entornos digitales restringidos y supervisados de manera segura, con una actitud responsable ante su uso.","A través de este bloque competencial, se comprobará que el alumnado es capaz de planificar y utilizar estrategias, de manera autónoma, para la resolución de conflictos, a través de la deliberación argumentada y el uso del lenguaje, teniendo en cuenta aspectos verbales y no verbales, y favoreciendo la utilización no solo eficaz sino también ética de los diferentes sistemas de comunicación (verbal, no verbal, signado…)."],"competencias":["C5","C10"],"saberesBasicos":["I-1,2,3,4,5","II-3.1,3.2,3.3,3.6,3.7"],"descriptoresClave":"C5: CCL1, CCL3, CCL5, STEM1, CD2, CD3, CPSAA4, CPSAA5, CC2 · C10: CCL1, CCL5, CP3, CD3, CPSAA3, CC1, CC2, CC3","criterios":["5.1","10.1"],"actividades":["Lectura y comprensión de texto expositivo.","Reconocimiento de acentuación de interrogativos y exclamativos.","Reconocimiento de los pronombres personales.","Redacción de noticia sobre animales."],"programas":["Plan de Comunicación Lingüística","Plan Tic","Plan de Convivencia","Plan de Igualdad","Radio Escolar","Promoción de la Salud y la Educación Emocional","Huerto Escolar"],"periodo":"Del 16 de noviembre al 27 de noviembre","sesiones":"8","trimestre":"1º","tecnicas":["Observación sistemática","Encuestación","Análisis de documentos","Análisis de producciones","Análisis de artefactos"],"herramientas":["Registro anecdótico","Registro descriptivo","Escalas de valoración","Listas de control","Diario de clase del profesorado","Entrevistas"],"instrumentos":["Cuestionarios","Formularios","Rúbricas","Listas de cotejo"],"productos":["Actividades","Rutinas de pensamiento","Fichas de trabajo"],"modelosEnsenanza":"Aprendizaje cooperativo, Aprendizaje basado en proyectos, Aprendizaje basado en el pensamiento: Rutinas y destrezas de pensamiento, Aprendizaje basado en tareas, Inteligencias Múltiples.","metodologias":"Investigación guiada (INV), Inductivo Básico (IBAS), Formación de conceptos (FORC), Sinéctico (SINE), Expositivo (EXPO), Deductivo (DEDU), Organizadores previos (ORGP), Investigación grupal (IGRU), Juego de roles (JROL), Enseñanza directa (EDIR), Simulación (SIM), Enseñanza no directiva (END).","agrupamientos":"Trabajo individual (TIND), trabajo en parejas (TPAR), pequeños grupos (PGRU), gran grupo (GGRU), equipos móviles o flexibles (EMOV), grupos de expertos (GEXP), grupos fijos (GFIJ), grupos heterogéneos (GHET), grupos homogéneos (GHOM), grupos interactivos (GINT).","espacios":["Aula","Aula con recursos TIC"],"recursos":["Recursos web","Multimedia","Ordenadores","PDI","Sistema de proyección","Textuales","Gráficos","Juegos didácticos","Centros de investigación"],"transversales":"Buen uso de las TIC aplicando estrategias básicas basadas en la búsqueda y tratamiento de la información. Convivencia y Educación cívica vinculando las producciones propias individuales y colectivas a una actitud de respeto, valoración contribuyendo al pleno desarrollo personal, creativo y emocional del individuo. Expresión oral y escrita: el alumnado trabajará, de manera oral y escrita, la realización de producciones orales, interacciones orales y presentación multimedia.","vinculacion":"El carácter competencial de esta situación de aprendizaje hace que los aprendizajes se puedan vincular con los propuestos desde el resto de áreas que se imparten en el nivel.","tiposEvaluacion":[{"tipo":"Heteroevaluación","texto":"realizada por personas distintas al alumnado para evaluar y calificar."},{"tipo":"Coevaluación","texto":"realizada entre el alumnado."},{"tipo":"Autoevaluación","texto":"realizada mediante la reflexión individual del alumnado para valorar sus logros y dificultades."}],"valoracionDesarrollo":"","propuestasMejora":"","confinamiento":"En caso de confinamiento utilizaremos la plataforma de formación (EVAGD), como venimos haciendo durante todo el curso. Las sesiones en MEET serán según el  horario presencial, de manera que no desorientemos al alumnado. En caso de poder anticiparlo con antelación, se usarán también recursos en formato papel: libros y cuadernos."},{"id":"sa5","numero":5,"titulo":"¿QUIÉN ES ARTISTA?","descripcion":"Los artistas son personas dotadas de la capacidad o habilidad necesarias para alguna de las bellas artes: danza, pintura, música, literatura, etc. En la unidad que nos ocupa, nuestro alumnado va a reflexionar sobre el trabajo y las cualidades de los artistas y, a su vez, va a ofrecer su opinión sobre sus gustos y preferencias en las distintas disciplinas artísticas. Los alumnos y alumnas trabajarán los textos biográficos buscando datos informativos relevantes sobre un artista. De forma paralela, uniendo las disciplinas artísticas de la música y la literatura, organizarán un karaoke poético para que disfruten de la poesía.","explicacionBloques":["A través de este bloque competencial, se constatará que el alumnado lee obras de manera autónoma y comparte las experiencias de lectura. Para ello se comprobará que puede usar estrategias para seleccionar, con criterio propio, textos ajustados a sus gustos e intereses, partiendo de sus experiencias emocionales y realizando indagaciones que le ayuden a leer con autonomía creciente, obras o fragmentos variados y equilibrados, adecuados a su nivel madurativo y organizados en itinerarios lectores temáticos, de género o de cualquier otra naturaleza. Asimismo, se valorará que es capaz de compartir su experiencia y sus preferencias en comunidades lectoras, a través de la expresión de hechos y el intercambio de conceptos, pensamientos, opiniones, sentimientos de forma oral escrita, artística o multimodal, con actitud cooperativa y respetuosa."],"competencias":["C7"],"saberesBasicos":["III-1,2,3,4,5,6,7,8,9","IV-1,2,3,4"],"descriptoresClave":"C7: CCL1, CCL4, CD3, CPSAA1, CC3, CCEC1, CCEC  básicas basadas en la búsqueda y tratamiento de la información. Convivencia y Educación cívica vinculando las producciones propias individuales y colectivas a una actitud de respeto, valoración contribuyendo al pleno desarrollo personal, creativo y emocional del individuo. Expresión oral y escrita: el alumnado trabajará, de manera oral y escrita, la realización de producciones orales, interacciones orales y presentación multimedia.","vinculacion":"El carácter competencial de esta situación de aprendizaje hace que los aprendizajes se puedan vincular con los propuestos desde el resto de áreas que se imparten en el nivel.","tiposEvaluacion":[{"tipo":"Heteroevaluación","texto":"realizada por personas distintas al alumnado para evaluar y calificar."},{"tipo":"Coevaluación","texto":"realizada entre el alumnado."},{"tipo":"Autoevaluación","texto":"realizada mediante la reflexión individual del alumnado para valorar sus logros y dificultades."}],"valoracionDesarrollo":"","propuestasMejora":"","confinamiento":"En caso de confinamiento utilizaremos la plataforma de formación (EVAGD), como venimos haciendo durante todo el curso. Las sesiones en MEET serán según el  horario presencial, de manera que no desorientemos al alumnado. En caso de poder anticiparlo con antelación, se usarán también recursos en formato papel: libros y cuadernos."},{"id":"sa6","numero":6,"titulo":"¿QUEDA AGUA?","descripcion":"El agua es el líquido más abundante de la Tierra y es considerado el recurso natural más importante e indispensable para la vida. Actualmente, hay un grave problema de sequía que provoca que nuestras reservas de agua estén disminuyendo de forma alarmante y, por ello, se proponen medidas para su consumo responsable. A lo largo de esta unidad se va a transmitir este mensaje y a favorecer la reflexión de nuestro alumnado sobre este tema a partir de la realización de un debate en el aula, la interpretación de una publicación en un blog, el acceso a internet para investigar fuentes fiables, la redacción de un artículo de opinión argumentado, etc. En definitiva, utilizaremos diferentes medios de comunicación para divulgar el valor del agua y sus cuidados.","explicacionBloques":["A través de este bloque competencial, se comprobará que el alumnado es capaz de realizar un tratamiento adecuado de la información en un proceso de investigación sencillo, a través de un método de trabajo realizado preferentemente de manera cooperativa en torno a temas relacionados con el propio currículo escolar o con los retos y desafíos del siglo XXI. Para ello, se verificará que puede localizar información determinada, realizando búsquedas pautadas en diferentes soportes y poniendo en práctica hábitos de uso crítico, seguro, sostenible y saludable; seleccionar dicha información a través de estrategias de comprensión lectora; contrastarla en distintas fuentes documentales conociendo los riesgos de los entornos digitales; evaluar su utilidad, fiabilidad y pertinencia en función de los objetivos de lectura, reconociendo algunos peligros de la manipulación y la desinformación, distinguiendo entre hechos y opiniones.","Se favorecerá la reflexión continuada en torno a la lengua y sus condiciones de uso, de manera ajustada a las posibilidades de abstracción de estas edades, para lo que se comprobará que el alumnado es capaz de reflexionar, utilizando métodos tanto inductivos como deductivos, sobre aspectos lingüísticos elementales, haciendo especial hincapié en el español hablado en Canarias."],"competencias":["C6","C9"],"saberesBasicos":["I-4,5","II-3.7","IV-1,2,3,4,5,6,7"],"descriptoresClave":"C6: CCL3, CD1, CD2, CD3, CD4, CPSAA5, CC2, CE3 · C9: CCL1, CCL2, CP2, STEM1, STEM2, CPSAA4, CPSAA5","criterios":["6.1","9.1","9.2"],"actividades":["Lectura y comprensión de texto argumentativo.","Reconocimiento del uso de la g y la j.","Reconocimiento de las palabras variables.","Artículo de opinión."],"programas":["Plan de Comunicación Lingüística","Plan Tic","Plan de Convivencia","Pl  y realizar lecturas guiadas, acompañadas y autónomas, con especial atención a la literatura canaria, de manera silenciosa o en voz alta, empleando la entonación y el ritmo adecuados. De la misma manera, se constatará que realiza un análisis de los elementos constitutivos de la obra literaria, atendiendo a las especificidades de cada género, y que construye y reconoce el sentido de los textos y los valores proyectados en los mismos. Por último, se verificará que produce textos literarios, de manera libre y a partir de la reelaboración de modelos dados, que incluyan otros lenguajes artísticos."],"competencias":["C8"],"saberesBasicos":["II-1.1,2.2,3.1,3.2","III-1,2,3,4,5,6,7,8,9"],"descriptoresClave":"C8: CCL1, CCL2, CCL4, CCEC1, CCEC2, CCEC3, CCEC4","criterios":["8.1","8.2"],"actividades":["Lectura y comprensión de texto narrativo: Un valioso regalo.","Reconocimiento de palabras homónimas y parónimas.","Reconocimiento del uso de la h.","Reconocimiento de la oración y sus clases.","Representación de obra de teatro."],"programas":["Plan de Comunicación Lingüística","Plan Tic","Plan de Convivencia","Plan de Igualdad","Radio Escolar","Promoción de la Salud y la Educación Emocional","Huerto Escolar"],"periodo":"Del 8 de febrero al 19 de febrero","sesiones":"8","trimestre":"2º","tecnicas":["Observación sistemática","Encuestación","Análisis de documentos","Análisis de producciones","Análisis de artefactos"],"herramientas":["Registro anecdótico","Registro descriptivo","Escalas de valoración","Listas de control","Diario de clase del profesorado","Entrevistas"],"instrumentos":["Cuestionarios","Formularios","Rúbricas","Listas de cotejo"],"productos":["Actividades","Rutinas de pensamiento","Fichas de trabajo"],"modelosEnsenanza":"Aprendizaje cooperativo, Aprendizaje basado en proyectos, Aprendizaje basado en el pensamiento: Rutinas y destrezas de pensamiento, Aprendizaje basado en tareas, Inteligencias Múltiples.","metodologias":"Investigación guiada (INV), Inductivo Básico (IBA rientemos al alumnado. En caso de poder anticiparlo con antelación, se usarán también recursos en formato papel: libros y cuadernos."},{"id":"sa8","numero":8,"titulo":"¿CÓMO NOS DIVERTIMOS?","descripcion":"Las actividades de ocio que realizamos en nuestro tiempo libre nos permiten salir de la rutina, cargarnos de energía y reforzar las relaciones interpersonales, entre otros beneficios. Al inicio de la unidad, los alumnos y alumnas van a reflexionar sobre por qué las personas necesitan divertirse y a determinar sus propias formas de diversión comparándolas con algunas que existían antiguamente. En el desarrollo de la unidad, de forma transversal, se trabajarán los usos del lenguaje empleados en las instrucciones de juegos o actividades y su correcta comprensión para ponerlas en práctica. Para finalizar, el alumnado ha de redactar una crónica sobre un espectáculo al que le gustaría asistir en su tiempo libre.","explicacionBloques":["A través de este bloque competencial, se valorará que el alumnado sea capaz de interpretar diferentes textos escritos y multimodales del ámbito personal, social o escolar con diferente tipología, diversidad de géneros discursivos y en diferentes formatos, analizando y valorando su contenido y sus características.","Se comprobará que el alumnado es capaz de producir, de manera creativa, textos escritos y multimodales con coherencia, cohesión y adecuación, aplicando estrategias para las distintas fases del proceso: planificación, redacción, revisión, edición y difusión."],"competencias":["C4","C5"],"saberesBasicos":["II-3.2,3.4,3.5,3.6,3.7","IV-1,2,3,4,5,6,7"],"descriptoresClave":"C4: CCL2, CCL3, CCL5, CP2, STEM1, CD1, CPSAA4, CPSAA5 · C5: CCL1, CCL3, CCL5, STEM1, CD2, CD3, CPSAA4, CPSAA5, CC2","criterios":["4.1","4.2","5.1"],"actividades":["Lectura y comprensión de instrucciones.","Reconocimiento de la y.","Reconocimiento del sujeto.","Crónica de un espectáculo."],"programas":["Plan de Comunicación Lingüística","Plan Tic","Plan de Conviven
