probará que el alumnado es capaz de realizar un tratamiento adecuado de la información en un proceso de investigación sencillo, a través de un método de trabajo realizado preferentemente de manera cooperativa."],"competencias":["C1","C6"],"saberesBasicos":["I-1,2,3,4,5","II-3.1,3.2,3.7","IV-1,2,3,4,5,6,7"],"descriptoresClave":"C1: CCL1, CCL5, CP2, CP3, CC1, CC2, CCEC1, CCEC3 · C6: CCL3, CD1, CD2, CD3, CD4, CPSAA5, CC2, CE3","criterios":["1.1","6.1","6.2"],"actividades":["Lectura y comprensión de un texto narrativo: Esta es mi historia.","Reconocimiento de extranjerismos, arcaísmos y neologismos.","Reconocimiento del uso de la «x».","Reconocimiento del predicado.","Álbum de greguerías."],"programas":["Plan de Comunicación Lingüística","Plan Tic","Plan de Convivencia","Plan de Igualdad","Radio Escolar","Promoción de la Salud y la Educación Emocional","Huerto Escolar"],"periodo":"Del 5 de abril al 16 de abril","sesiones":"8","trimestre":"3º","tecnicas":["Observación sistemática","Encuestación","Análisis de documentos","Análisis de producciones","Análisis de artefactos"],"herramientas":["Registro anecdótico","Registro descriptivo","Escalas de valoración","Listas de control","Diario de clase del profesorado","Entrevistas"],"instrumentos":["Cuestionarios","Formularios","Rúbricas","Listas de cotejo"],"productos":["Actividades","Rutinas de pensamiento","Fichas de trabajo"],"modelosEnsenanza":"Aprendizaje cooperativo, Aprendizaje basado en proyectos, Aprendizaje basado en el pensamiento: Rutinas y destrezas de pensamiento, Aprendizaje basado en tareas, Inteligencias Múltiples.","metodologias":"Investigación guiada (INV), Inductivo Básico (IBAS), Formación de conceptos (FORC), Sinéctico (SINE), Expositivo (EXPO), Deductivo (DEDU), Organizadores previos (ORGP), Investigación grupal (IGRU), Juego de roles (JROL), Enseñanza directa (EDIR), Simulación (SIM), Enseñanza no directiva (END).","agrupamientos":"Trabajo individual (TIND), trabajo en parejas (TPAR), pequeños grupos (PGRU opone la participación en un debate para que los alumnos y alumnas se expresen con seguridad y educación y reflexionen sobre los hábitos alimenticios. De manera interrelacionada, se vincula este tema con el de la publicidad y, particularmente, con la relevancia que poseen los textos y las imágenes para influenciar al público. Además, nuestro alumnado va a trabajar la expresión escrita a partir de la redacción de recetas y la elaboración de un libro de cocina sana, y también la comprensión de textos con la interpretación de etiquetas alimenticias.","explicacionBloques":["A través de este bloque competencial, se favorecerá la reflexión continuada en torno a la lengua y sus condiciones de uso, de manera ajustada a las posibilidades de abstracción de estas edades, para lo que se comprobará que el alumnado es capaz de reflexionar, utilizando métodos tanto inductivos como deductivos, sobre aspectos lingüísticos elementales, haciendo especial hincapié en el español hablado en Canarias."],"competencias":["C9"],"saberesBasicos":["I-1,2,3,4,5","IV-1,2,3,4,5,6,7"],"descriptoresClave":"C9: CCL1, CCL2, CP2, STEM1, STEM2, CPSAA4, CPSAA5","criterios":["9.1","9.2"],"actividades":["Lectura y comprensión de un texto informativo: la publicidad.","Reconocimiento del uso del guion.","Reconocimiento del complemento directo y el indirecto.","Libro de cocina sana."],"programas":["Plan de Comunicación Lingüística","Plan Tic","Plan de Convivencia","Plan de Igualdad","Radio Escolar","Promoción de la Salud y la Educación Emocional","Huerto Escolar"],"periodo":"Del 19 de abril al 30 de abril","sesiones":"8","trimestre":"3º","tecnicas":["Observación sistemática","Encuestación","Análisis de documentos","Análisis de producciones","Análisis de artefactos"],"herramientas":["Registro anecdótico","Registro descriptivo","Escalas de valoración","Listas de control","Diario de clase del profesorado","Entrevistas"],"instrumentos":["Cuestionarios","Formularios","Rúbricas","Listas de cotejo"],"productos":["A n individual del alumnado para valorar sus logros y dificultades."}],"valoracionDesarrollo":"","propuestasMejora":"","confinamiento":"En caso de confinamiento utilizaremos la plataforma de formación (EVAGD), como venimos haciendo durante todo el curso. Las sesiones en MEET serán según el  horario presencial, de manera que no desorientemos al alumnado. En caso de poder anticiparlo con antelación, se usarán también recursos en formato papel: libros y cuadernos."},{"id":"sa11","numero":11,"titulo":"¿CÓMO TE SUENA?","descripcion":"La música es una disciplina artística que posee un gran calado social ya que está presente en multitud de situaciones cotidianas. Además, nos aporta numerosos beneficios, tanto al escucharla como al interpretarla. Estas cuestiones, entre otras, se considerarán en el debate inicial de la unidad para fomentar el pensamiento crítico de nuestro alumnado. De forma paralela, vamos a trabajar la lectura y comprensión de los relatos mitológicos, y los estudiantes continuarán familiarizándose con la utilización de diversos recursos poéticos como la personificación, la hipérbole y el paralelismo, determinarán cuál es la vinculación entre la música y la poesía, y organizarán una gincana literaria sobre autores y autoras célebres.","explicacionBloques":["Con este bloque competencial, se comprobará que el alumnado, a través de su participación en itinerarios lectores, es capaz de escuchar textos literarios y realizar lecturas guiadas, acompañadas y autónomas, con especial atención a la literatura canaria, de manera silenciosa o en voz alta, empleando la entonación y el ritmo adecuados."],"competencias":["C8"],"saberesBasicos":["I-4,5","II-1.1,3.1,3.2,3.7","III-1,2,7,8,9"],"descriptoresClave":"C8: CCL1, CCL2, CCL4, CCEC1, CCEC2, CCEC3, CCEC4","criterios":["8.1","8.2"],"actividades":["Lectura y comprensión de un texto narrativo: Orfeo y Eurídice.","Reconocimiento del uso de siglas, acrónimos y abreviaturas.","Reconocimiento de signos que cierran enunciados." <script>
const DATA = JSON.parse(document.getElementById('data-json').textContent);
const EC = DATA.elementosComunes;
const CUR = DATA.curriculo;
const SAS = DATA.sas;

document.getElementById('logo-cole-side').src = 'data:image/jpeg;base64,' + DATA.logos.cole;

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function field(id, text, placeholder, tag){
  tag = tag || 'div';
  return `<${tag} class="field" contenteditable="true" data-empty="true" data-placeholder="${esc(placeholder||'Escribe aquí…')}" id="${id}">${esc(text||'')}</${tag}>`;
}

function chipList(id, arr){
  return `<div class="chipbox" id="${id}" contenteditable="false">` +
    arr.map((c)=>`<span class="chip" contenteditable="true">${esc(c)}</span>`).join('') +
  `</div>`;
}

function editableList(id, arr){
  return `<ul class="editable-list" id="${id}">` +
    arr.map(item=>`<li contenteditable="true">${esc(item)}</li>`).join('') +
  `</ul>`;
}

/* ---------------- ELEMENTOS COMUNES PAGE ---------------- */
function renderElementosComunes(){
  const ac = EC.actividadesComplementariasLista.map((a,i)=>
    `<div class="meta-item" style="min-width:180px"><b contenteditable="true" id="ac_${i}_label">${esc(a.trimestre)}</b>${field('ac_'+i+'_value', a.actividad, 'Actividad…')}</div>`
  ).join('');

  return `
  <div class="hero">
    <img src="data:image/jpeg;base64,${DATA.logos.cole}" alt="Logo del centro">
    <div class="titlebox">
      <h1>Programación Didáctica Anual — Lengua Castellana y Literatura</h1>
      <div class="grid3" style="margin-top:8px">
        <div><b style="font-size:11px;color:#6b7280;text-transform:uppercase">Centro educativo</b>${field('centro', EC.centro,'Centro educativo')}</div>
        <div><b style="font-size:11px;color:#6b7280;text-transform:uppercase">Nivel</b>${field('nivel', EC.nivel,'Nivel')}</div>
        <div><b style="font-size:11px;color:#6b7280;text-transform:uppercase">Docentes responsables</b>${field('docentes', EC.docentes,'Docentes')}</div>
      </div>
    </div>
    <img src="data:image/jpeg;base64,${DATA.logos.gobierno}" alt="Logo del Gobierno">
  </div>

  <div class="card">
    <h3>🎯 Punto de partida (diagnóstico inicial de las necesidades de aprendizaje)</h3>
    ${field('puntoPartidaGeneral', EC.puntoPartidaGeneral,'Descripción general…')}
    <h4>Grupo 6º A</h4>
    ${field('puntoPartida6A', EC.puntoPartida6A,'Características del grupo 6ºA…')}
    <h4>Grupo 6º B</h4>
    ${field('puntoPartida6B', EC.puntoPartida6B,'Características del grupo 6ºB…')}
    <h4>Grupo 6º C</h4>
    ${field('puntoPartida6C', EC.puntoPartida6C,'Características del grupo 6ºC…')}
  </div>

  <div class="card">
    <h3>📖 Justificación de la programación didáctica</h3>

/* ---------------- CURRICULUM helper renders ---------------- */
function competenciaBlock(code){
  const c = CUR.competencias[code];
  if(!c) return '';
  return `<div class="curric-block">
    <div class="code">${esc(code)} · Competencia específica</div>
    <div class="desc"><b>Enunciado:</b> ${esc(c.enunciado)}</div>
    <div class="desc"><b>Descriptores clave:</b> ${esc(c.descriptores)}</div>
    <div class="desc"><b>Explicación del bloque competencial:</b> ${esc(c.explicacion)}</div>
  </div>`;
}
function criterioBlock(code){
  const base = code.split('.')[0];
  const comp = CUR.competencias['C'+base];
  if(!comp || !comp.criterios[code]) return `<div class="curric-block"><div class="code">${esc(code)}</div><div class="desc">Criterio no localizado en el anexo.</div></div>`;
  return `<div class="curric-block">
    <div class="code">Criterio ${esc(code)}</div>
    <div class="desc">${esc(comp.criterios[code])}</div>
  </div>`;
}
function saberBlock(saberStr){
  const m = saberStr.match(/^([IVX]+)-(.+)$/);
  if(!m) return `<div class="curric-block"><div class="code">${esc(saberStr)}</div></div>`;
  const bloque = m[1];
  const codes = m[2].split(',').map(s=>s.trim());
  const b = CUR.saberes[bloque];
  if(!b) return `<div class="curric-block"><div class="code">${esc(saberStr)}</div></div>`;
  let html = `<div class="curric-block"><div class="code">Bloque ${esc(bloque)} · ${esc(b.titulo)}</div>`;
  codes.forEach(code=>{
    const txt = b.items[code];
    html += `<div class="desc"><b>${esc(code)}.</b> ${esc(txt||'(código no localizado)')}</div>`;
  });
  html += `</div>`;
  return html;
}

/* ---------------- BUILD PAGES + NAV (idempotent) ---------------- */
const contentEl = document.getElementById('content');
const navSas = document.getElementById('nav-sas');

function buildPages(){
  contentEl.innerHTML = '';
  navSas.innerHTML = '<h4>Situaciones de aprendizaje</h4>';

  const pageEC = document.createElement('div');
  pageEC.className = 'page active';
  pageEC.id = 'page-elementos-comunes';
  pageEC.innerHTML = renderElementosComunes();
  contentEl.appendChild(pageEC);

  SAS.forEach(sa=>{
    const page = document.createElement('div');
    page.className = 'page';
    page.id = 'page-'+sa.id;
    page.innerHTML = renderSA(sa);
    contentEl.appendChild(page);

    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.dataset.page = sa.id;
    btn.onclick = ()=>goTo(sa.id);
    btn.innerHTML = `<span class="sa-num">${sa.numero}</span> ${esc(sa.titulo)}`;
    navSas.appendChild(btn);
  });
}
buildPages();

function goTo(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const target = document.getElementById('page-'+id);
  if(!target) return;
  target.classList.add('active');
  const btn = document.querySelector(`.nav-btn[data-page="${id}"]`);
  if(btn) btn.classList.add('active');
  if(id==='elementos-comunes'){
    document.getElementById('topbar-title').textContent = 'Elementos comunes de la programación';
    document.getElementById('topbar-sub').textContent = 'Editable · haz clic sobre cualquier texto para modificarlo';
  } else {
    const sa = SAS.find(s=>s.id===id);
    document.getElementById('topbar-title').textContent = 'SA '+sa.numero+' · '+sa.titulo;
    document.getElementById('topbar-sub').textContent = sa.periodo + ' · ' + sa.sesiones + ' sesiones · ' + sa.trimestre + ' trimestre';
  }
  window.scrollTo({top:0,behavior:'instant'});
}

/* ---------------- PRINT ---------------- */
function printCurrent(){
  const active = document.querySelector('.page.active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('print-target'));
  active.classList.add('print-target');
  document.body.classList.remove('print-all');
  window.print();
}
function printAll(){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('print-target'));
  document.body.classList.add('print-all');
  window.print();
  setTimeout(()=>document.body.classList.remove('print-all'), 500);
}

/* ---------------- HARVEST (read current edits back into a data object) ---------------- */
function txt(id){
  const el = document.getElementById(id);
  return el ? el.textContent.trim() : '';
}
function listTxt(id){
  const el = document.getElementById(id);
  if(!el) return [];
  return Array.from(el.children).map(li=>li.textContent.trim()).filter(t=>t.length);
}
function chipsTxt(id){
  const el = document.getElementById(id);
  if(!el) return [];
  return Array.from(el.children).map(c=>c.textContent.trim()).filter(t=>t.length);
}

function harvestData(){
  const out = JSON.parse(JSON.stringify(DATA)); // deep clone of ORIGINAL structural shape

  const ecKeys = ['centro','nivel','docentes','puntoPartidaGeneral','puntoPartida6A','puntoPartida6B','puntoPartida6C',
    'justificacion','modelosMetodologicos','agrupamientosGeneral','espaciosGeneral','recursosGeneral',
    'actividadesComplementariasTexto','atencionDiversidad','orientacionesNEAE','evaluacionGeneral',
    'estrategiasRefuerzo','concrecionObjetivos'];
  ecKeys.forEach(k=>{ out.elementosComunes[k] = txt(k); });

  out.elementosComunes.actividadesComplementariasLista = out.elementosComunes.actividadesComplementariasLista.map((a,i)=>({
    trimestre: txt('ac_'+i+'_label') || a.trimestre,
    actividad: txt('ac_'+i+'_value')
  }));

  out.sas = out.sas.map(sa=>{
    const s = JSON.parse(JSON.stringify(sa));
    let tituloRaw = txt(sa.id+'_titulo');
    tituloRaw = tituloRaw.replace(/^["“]+/,'').replace(/["”]+$/,'').trim();
    s.titulo = tituloRaw || sa.titulo;
    s.periodo = txt(sa.id+'_periodo');
    s.sesiones = txt(sa.id+'_sesiones');
    s.trimestre = txt(sa.id+'_trimestre');
    s.descripcion = txt(sa.id+'_descripcion');
    s.explicacionBloques = sa.explicacionBloques.map((p,i)=> txt(sa.id+'_explic_'+i) );
    s.competencias = chipsTxt(sa.id+'_comp_chips');
    s.saberesBasicos = chipsTxt(sa.id+'_saberes_chips');
    s.descriptoresClave = txt(sa.id+'_descclave');
    s.criterios = chipsTxt(sa.id+'_crit_chips');
    s.tecnicas = listTxt(sa.id+'_tecnicas');
    s.herramientas = listTxt(sa.id+'_herramientas');
    s.instrumentos = listTxt(sa.id+'_instrumentos');
    s.actividades = listTxt(sa.id+'_actividades');
    s.tiposEvaluacion = sa.tiposEvaluacion.map((t,i)=>({
      tipo: txt(sa.id+'_tipoeval_'+i+'_label') || t.tipo,
      texto: txt(sa.id+'_tipoeval_'+i+'_texto')
    }));
    s.productos = listTxt(sa.id+'_productos');
    s.modelosEnsenanza = txt(sa.id+'_modelos');
    s.metodologias = txt(sa.id+'_metodologias');
    s.agrupamientos = txt(sa.id+'_agrup');
    s.espacios = listTxt(sa.id+'_espacios');
    s.recursos = listTxt(sa.id+'_recursos');
    s.transversales = txt(sa.id+'_transversales');
    s.programas = listTxt(sa.id+'_programas');
    s.vinculacion = txt(sa.id+'_vinculacion');
    s.confinamiento = txt(sa.id+'_confinamiento');
    s.valoracionDesarrollo = txt(sa.id+'_desarrollo');
    s.propuestasMejora = txt(sa.id+'_mejora');
    return s;
  });

  return out;
}

/* ---------------- EXPORT ---------------- */
function exportHtml(){
  const newData = harvestData();
  const clone = document.documentElement.cloneNode(true);

  // Reset the rendered content so the exported file rebuilds cleanly on load (avoids duplication)
  const cContent = clone.querySelector('#content');
  if(cContent) cContent.innerHTML = '';
  const cNav = clone.querySelector('#nav-sas');
  if(cNav) cNav.innerHTML = '<h4>Situaciones de aprendizaje</h4>';

  // Inject the freshly harvested data
  const jsonEl = clone.querySelector('#data-json');
  const jsonStr = JSON.stringify(newData).replace(/<\/script>/g, '<\\/script>');
  jsonEl.textContent = jsonStr;

  const htmlStr = '<!DOCTYPE html>\n' + clone.outerHTML;
  const blob = new Blob([htmlStr], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = 'programacion_lengua_6_'+stamp+'.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
